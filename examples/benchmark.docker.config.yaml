# Tooltrim benchmark config (Docker variant)
#
# Same as examples/benchmark.config.yaml, but the inbound HTTP and Prometheus
# exporters bind to 0.0.0.0 so a `docker run -p ...` port-forward can reach
# them from the host. When running on the host directly, prefer the loopback
# config (examples/benchmark.config.yaml).
#
# Required env vars:
#   GITHUB_TOKEN     - read-only GitHub Personal Access Token (public_repo is enough)
#
# Optional env vars:
#   BENCH_FS_ROOT    - directory the filesystem upstream may read (defaults to /app/bench/sandbox inside the image)
#   BENCH_HTTP_PORT  - inbound HTTP port (defaults to 8799)

servers:
  everything:
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-everything"]

  filesystem:
    transport: stdio
    command:
      - "npx"
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "${BENCH_FS_ROOT:-/app/bench/sandbox}"

  memory:
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-memory"]

  sequentialthinking:
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-sequential-thinking"]

  github:
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"

filters:
  allow:
    - "everything.*"
    - "filesystem.*"
    - "memory.*"
    - "sequentialthinking.*"
    - "github.search_*"
    - "github.get_*"
    - "github.list_*"
  deny:
    - "*.delete_*"
    - "*.create_or_update_*"

shrink:
  mode: rules
  maxDescriptionChars: 160
  dedupeSchemas: true
  cachePath: .tooltrim/shrink-cache.json

inbound:
  stdio: false
  http:
    enabled: true
    host: 0.0.0.0
    port: 8799
    path: /mcp
    sessions: stateless

observability:
  trace:
    sink: file
    path: .tooltrim/trace.ndjson
  metrics:
    prometheus:
      enabled: true
      host: 0.0.0.0
      port: 9464
  audit:
    enabled: true
    path: .tooltrim/audit.ndjson

policy:
  defaultAuth: none
  blockedTools: []

logLevel: warn
