# mcp-diet benchmark config
#
# This is the proxy config the bench harness boots before running each phase.
# Five real upstream MCP servers; HTTP inbound only so the bench harness can
# talk to it as a regular MCP client; trace + Prometheus + audit on so the
# REPORT.md has real evidence to cite.
#
# Required env vars:
#   GITHUB_TOKEN     - read-only GitHub Personal Access Token (public_repo is enough)
#
# Optional env vars:
#   BENCH_FS_ROOT    - directory the filesystem upstream may read (defaults to ./bench/sandbox)
#   BENCH_HTTP_PORT  - inbound HTTP port (defaults to 8799)

servers:
  everything:
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-everything"]

  filesystem:
    transport: stdio
    command:
      - "npx"
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "${BENCH_FS_ROOT:-./bench/sandbox}"

  memory:
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-memory"]

  sequentialthinking:
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-sequential-thinking"]

  github:
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"

# The bench overrides the filter at runtime by mutating the loaded config; the
# values below are the "common" scenario used for regular `mcp-diet start`.
filters:
  allow:
    - "everything.*"
    - "filesystem.*"
    - "memory.*"
    - "sequentialthinking.*"
    - "github.search_*"
    - "github.get_*"
    - "github.list_*"
  deny:
    - "*.delete_*"
    - "*.create_or_update_*"

shrink:
  mode: rules
  maxDescriptionChars: 160
  dedupeSchemas: true
  cachePath: .mcp-diet/shrink-cache.json

inbound:
  stdio: false
  http:
    enabled: true
    host: 127.0.0.1
    port: 8799
    path: /mcp
    sessions: stateless

observability:
  trace:
    sink: file
    path: .mcp-diet/trace.ndjson
  metrics:
    prometheus:
      enabled: true
      host: 127.0.0.1
      port: 9464
  audit:
    enabled: true
    path: .mcp-diet/audit.ndjson

policy:
  defaultAuth: none
  blockedTools: []

logLevel: warn
